###############################################
# Home Camera System — MediaMTX config
#
# Pulls H.264 from the RPi camera via GStreamer (libargus / nvarguscamerasrc),
# republishes as WebRTC at http://<jetson>:8889/cam/whep for the PWA.
###############################################

logLevel: info
logDestinations: [stdout]

# Protocols we don't use — disable to reduce attack surface.
rtmp: no
hls: no
srt: no

# RTSP is used internally as the ingest transport from GStreamer → MediaMTX.
rtspAddress: :8554

# WebRTC is what the browser pulls from.
webrtcAddress: :8889
# iter cellular-ice (2026-06-17): offer an ICE-over-TCP candidate alongside
# the default UDP one (:8189). On cellular over Tailscale the WHEP control
# plane (HTTPS/443 via `tailscale serve`) connects fine, but the WebRTC media
# UDP to :8189 never arrives (verified: tcpdump saw ~0 packets, MediaMTX logs
# "deadline exceeded while waiting connection"). ICE-TCP gives the phone a TCP
# media path — TCP traverses the same way the working control plane does — so
# the browser can fall back to it when UDP ICE fails. Additive: UDP stays the
# preferred path for clients where it works (LAN, wifi).
webrtcLocalTCPAddress: :8189
webrtcLocalUDPAddress: :8189
# Plain HTTP is fine for LAN. Flip to yes + serverCert/serverKey for TLS,
# or front MediaMTX with Caddy/Nginx.
webrtcEncryption: no
# Allow the PWA's origin to issue WHEP requests. (key was webrtcAllowOrigin
# pre-v1.18 — current MediaMTX uses webrtcAllowOrigins, plural.)
webrtcAllowOrigins: ['*']
# iter-265 (live-cam fix): announce the Jetson's Tailscale IP as an
# additional ICE host candidate. Without this, MediaMTX only
# advertises its LAN IP (10.0.0.9) — phones connecting through the
# Tailscale Funnel at homecam.tail4a6525.ts.net can't reach that
# IP for the WebRTC media UDP, so every WHEP session times out with
# "deadline exceeded while waiting connection".
#
# `100.85.251.7` is the Jetson's stable Tailscale 100.x.y.z address
# (`tailscale ip -4`). Adding it lets every browser on the same
# tailnet hit it directly over the WireGuard tunnel — same physical
# path that already carries the HTTPS WHEP control plane.
#
# `homecam.tail4a6525.ts.net` is the MagicDNS name; some phone OSes
# resolve it via Tailscale's resolver before the host candidate
# negotiation, others resolve via system DNS — listing both names
# costs nothing.
#
# When the LAN client (laptop on the same Wi-Fi as the Jetson) hits
# the PWA at the LAN IP directly, the LAN host candidate is still
# announced by default — Tailscale entries are additive.
#
# iter cellular-ice (2026-06-17): `webrtcAdditionalHosts` candidates are
# ADDITIVE to interface-gathered ones, NOT a replacement — setting
# `webrtcIPsFromInterfaces: no` produced ZERO candidates (WHEP answer had
# no a=candidate lines at all → WebRTC dead), so interface gathering must
# stay on. The cellular candidate-churn fix is being pinned down with the
# debug logging above; do not disable interface gathering.
webrtcAdditionalHosts: ['100.85.251.7', 'homecam.tail4a6525.ts.net']
# iter cellular-ice (2026-06-17): STUN (+ TURN) so MediaMTX gathers a
# server-reflexive (public) candidate of its own. On cellular the phone's
# in-browser WebRTC media won't route through the Tailscale tunnel, so the
# host candidates (LAN / Tailscale IP) are unreachable; both peers need a
# srflx candidate to hole-punch directly over the public internet. The
# client mirrors this (ICE_SERVERS in client/src/lib/webrtc.ts). TURN, when
# added, goes here as a second entry with username/password for the
# symmetric-NAT carriers where the direct hole-punch fails.
webrtcICEServers2:
  - url: stun:stun.l.google.com:19302

paths:
  cam:
    source: publisher

    # Jetson Nano 2GB + Arducam IMX477 (1/2.3", 12.3MP) + 96° M12 wide-angle
    # CCTV lens (F2.0, 3MP-rated). Camera swap landed iter-356.31; DTB
    # overlay switched via `config-by-hardware.py -n 2="Camera IMX477"`.
    #
    # IMX477 native sensor modes (per `gst-launch nvarguscamerasrc num-buffers=1`
    # GST_ARGUS dump on this Jetson):
    #   mode 0: 3840 x 2160 @ 30 fps — full sensor area (full FOV)
    #   mode 1: 1920 x 1080 @ 60 fps — center crop (~60 % horizontal FOV)
    #
    # IMPORTANT — image-circle / sensor-size mismatch with the current lens:
    # The 3MP-rated M12 lens projects an image circle sized for ~1/3" sensors;
    # the IMX477 is 1/2.3", noticeably larger. In mode 0 the corners are pure
    # black (geometric vignette — light never reaches those pixels). Mode 1's
    # 1080p center-crop neatly excludes the unusable corners, so it's the
    # correct choice for THIS lens. If a true 1/2.3"-rated wide-angle (e.g.
    # Arducam's "12MP / IMX477 compatible" M12) is fitted later, switch to
    # `sensor-mode=0` to recover the full ~96° FOV. Pre-iter-356.31 the auto-
    # pick happened to land on mode 1; pinning makes it explicit so a libargus
    # firmware bump can't silently switch us to mode 0 and start showing the
    # vignetted corners.
    #
    # Single producer (`nvarguscamerasrc`) -> hardware H.264 (`nvv4l2h264enc`)
    # -> RTSP push to localhost. The detection worker reads back from the
    # same RTSP path (`rtsp://localhost:8554/cam`) using jetson-utils +
    # NVDEC, which costs <10 % of the hardware decoder. Trying to share the
    # camera by tee'ing into a `shmsink` for the detection worker is
    # technically faster but JetPack's apt OpenCV is built WITHOUT
    # GStreamer support, and jetson-utils' `videoSource` consumes RTSP
    # natively — RTSP keeps the architecture simpler and still gives sub-frame
    # latency on the LAN.
    #
    # Encoder tuning for low-latency LAN WebRTC:
    #   - iframeinterval=8  -> ~0.27 s GOP. New viewers get a keyframe ~4
    #                          times a second; "camera on" first-frame wait
    #                          is bounded by the keyframe gap. Bandwidth
    #                          cost vs. iframeinterval=30 is ~5-10 % at this
    #                          bitrate — cheap on LAN.
    #   - insert-sps-pps=true -> SPS/PPS in every keyframe so decoders can
    #                            tune in mid-stream without parameter sets.
    #   - EnableTwopassCBR=false -> single-pass; saves an encode round-trip.
    #   - control-rate=1 -> CBR, good fit for Wi-Fi with steady bandwidth.
    #   - maxperf-enable=true -> pin NVENC to max clocks. Default is
    #                            "scale clocks under load", which adds
    #                            ~50-150 ms of encode latency on the first
    #                            frame after a quiet stretch. Power cost
    #                            on the Nano is ~0.5 W — negligible for
    #                            an always-on camera. preset-level
    #                            already defaults to UltraFastPreset (1)
    #                            on this version of nvv4l2h264enc, so no
    #                            need to set it explicitly.
    #   - vbv-size + peak-bitrate (iter-284, camera-library-usage-auditor C1):
    #     bound the encode-buffer drain. Pre-iter-284 a high-motion scene
    #     briefly bursts above the 2.5 Mbps CBR target and NVENC's rate-
    #     controller spends frames recovering — visible as keyframe-stutter
    #     + WHEP "deadline exceeded" on tailnet (which the iter-265
    #     webrtcAdditionalHosts fix paid down on the ICE side). vbv-size
    #     2500000 bits ≈ 1 s buffer at the target rate; peak-bitrate
    #     3000000 = 20 % CBR headroom for legitimate motion bursts. No
    #     measurable bandwidth uplift on idle scenes (CBR average stays
    #     at 2.5 Mbps).
    # iter-356.52 (camera-library-usage-auditor freeze fix):
    #   - nvvidconv between nvarguscamerasrc and the encoder. Sensor-
    #     mode 1 on the IMX477 is locked to 1920x1080 @ 60 fps by the
    #     hardware; the bare `caps-filter,width=1280,height=720,
    #     framerate=30/1` was silently widened during caps negotiation
    #     so nvv4l2h264enc was actually encoding 1080p60 into a
    #     2.5 Mbps CBR target — VBV drain on motion → encoder stalls →
    #     visible WebRTC freezes + 200+ RTP packets lost in first 60 s
    #     (mediamtx publisher session log). nvvidconv is the Tegra
    #     hardware scaler (VIC); keeps everything in NVMM, near-zero
    #     CPU cost.
    #   - rtspclientsink protocols=tcp. Default is UDP even on the
    #     loopback publisher leg; the same encoder back-pressure that
    #     overflows the VBV also overflows the UDP send buffer,
    #     dropping RTP packets that downstream NVDEC + WebRTC must
    #     conceal or stall on. TCP loopback is sub-ms RTT — no
    #     latency cost, eliminates the loss path.
    # iter-356.52a: nvvidconv on Tegra L4T 32.x cannot do framerate
    # conversion — only color/size. We resize to 720p in NVMM and
    # accept the sensor-native 60 fps into the encoder. At 720p60
    # the pixel-rate is ~55 Mpx/s (vs 1080p30 ≈ 62 Mpx/s) so the
    # encoder is actually less loaded than the original 1080p input
    # path, and 2.5 Mbps CBR is achievable. Smaller GOP-time
    # (iframeinterval=8 / 60 fps = 133 ms) gives crisper recovery on
    # any packet loss — beneficial side-effect.
    #
    # iter (camera-recovery 2026-06-20, deep-research-backed): the `watchdog`
    # element (gst-plugins-bad) after h264parse posts an ERROR to the bus if no
    # encoded buffers flow for `timeout` ms — i.e. the sensor/libargus wedged
    # MID-STREAM (the pipeline was running but stopped producing). That exits
    # the gst-launch, and `runOnInitRestart: yes` respawns it. Placed on the
    # post-encoder (regular-memory) boundary, not on the NVMM sensor caps, so
    # it can't perturb the zero-copy path. timeout=5000 = 5 s ≈ 300 dropped
    # frames at 60 fps (clearly a stall, not a hiccup). The deeper "Failed to
    # create CaptureSession" startup wedge is handled by the systemd BindsTo +
    # the escalating detection watchdog (restart nvargus-daemon).
    runOnInit: >-
      gst-launch-1.0 -e
      nvarguscamerasrc sensor-mode=1 !
      'video/x-raw(memory:NVMM),width=1920,height=1080,framerate=60/1' !
      nvvidconv !
      'video/x-raw(memory:NVMM),width=1280,height=720' !
      nvv4l2h264enc insert-sps-pps=true iframeinterval=8 control-rate=1 bitrate=2500000 vbv-size=2500000 peak-bitrate=3000000 EnableTwopassCBR=false maxperf-enable=true !
      h264parse !
      watchdog timeout=5000 !
      rtspclientsink protocols=tcp location=rtsp://localhost:$RTSP_PORT/cam
    runOnInitRestart: yes

    # Alternative (USB / V4L2 camera) — comment the libargus block above and use this:
    # runOnInit: >-
    #   gst-launch-1.0 -e
    #   v4l2src device=/dev/video0 !
    #   videoconvert !
    #   x264enc tune=zerolatency bitrate=2000 key-int-max=30 !
    #   h264parse !
    #   rtspclientsink location=rtsp://localhost:$RTSP_PORT/cam
    # runOnInitRestart: yes

  # ===========================================================================
  # Cellular-adaptive streaming — on-demand transcode ladder (iter cellular-adaptive)
  #
  # CRITICAL — SINGLE-OWNER libargus / SINGLE ENCODE-FROM-SENSOR:
  #   These cam_lq / cam_uq paths DO NOT touch the camera. There is exactly
  #   ONE `nvarguscamerasrc` in this whole file (the `cam` path above) and
  #   exactly ONE GStreamer `tee` count: zero. Each path below RE-DECODES the
  #   ALREADY-PUBLISHED `rtsp://localhost:8554/cam` H.264 stream via NVDEC
  #   (`nvv4l2decoder`), rescales with the Tegra VIC (`nvvidconv`, which also
  #   downloads NVMM -> system memory), and re-encodes to a smaller rung. This
  #   is a TRANSCODE of the published stream, NOT a second capture path.
  #   Do NOT "consolidate" by adding a GStreamer `tee` to the `cam` pipeline
  #   (libargus is single-owner; a tee on the capture branch is exactly the
  #   anti-pattern CLAUDE.md forbids).
  #
  # CRITICAL — WHY x264enc (SOFTWARE) AND NOT nvv4l2h264enc HERE:
  #   The hardware encoder `nvv4l2h264enc` emits output buffers with
  #   NON-MONOTONIC PTS when fed by NVDEC in a transcode (verified on-device
  #   2026-06-17: post-encode PTS came out `53 102 87 69 ...`, adjacent frames
  #   swapped). The bitstream itself is in correct order with no B-frames
  #   (ffprobe shows pure IPPP), but gortsplib's H264 DTS extractor inside
  #   MediaMTX reads the backwards-jumping presentation timestamps as frame
  #   reordering and kills every WebRTC reader with
  #   `WebRTC doesn't support H264 streams with B-frames`. The phone shows a
  #   black tile then the "can't reach camera" error. poc-type=2, disable-dpb,
  #   and num-B-Frames=0 do NOT fix it — the scramble is intrinsic to the Tegra
  #   NVENC output stage. The always-on `cam` path is unaffected because it
  #   encodes live sensor frames (monotonic PTS), which is why HQ works and only
  #   the low rungs were broken. `x264enc tune=zerolatency` produces strictly
  #   monotonic, B-frame-free, WebRTC-safe output. Decode stays on hardware
  #   NVDEC; only the (small, low-bitrate) encode is software. Cost measured at
  #   ~0.75 core for 480p60 / less for 360p30 — acceptable for an on-demand rung
  #   on the Nano's 4 cores. tune=zerolatency implies bframes=0; do not add
  #   B-frames back. The `cam` HQ path MUST stay nvv4l2h264enc (full res/bitrate
  #   would be far too costly in software).
  #
  # runOnDemand: MediaMTX launches the transcode only when a reader subscribes
  # to cam_lq / cam_uq, and runOnDemandCloseAfter tears it down once the last
  # reader leaves — so an idle low-bandwidth rung costs zero CPU/NVDEC.
  # On-device tegrastats headroom validation is operator-side.
  # ===========================================================================

  # LQ rung — 854x480, ~700 kbps. Phone on a decent LTE link.
  cam_lq:
    source: publisher
    runOnDemand: >-
      gst-launch-1.0 -e
      rtspsrc location=rtsp://localhost:$RTSP_PORT/cam latency=0 protocols=tcp !
      rtph264depay !
      h264parse !
      nvv4l2decoder !
      nvvidconv !
      'video/x-raw,width=854,height=480,format=I420' !
      x264enc tune=zerolatency bitrate=700 speed-preset=ultrafast key-int-max=48 !
      h264parse !
      rtspclientsink protocols=tcp location=rtsp://localhost:$RTSP_PORT/cam_lq
    runOnDemandRestart: yes
    runOnDemandCloseAfter: 10s

  # UQ rung — 640x360 at ~half source fps, ~400 kbps. Congested / metered cell.
  # Framerate cap is done at the DECODER via `nvv4l2decoder drop-frame-interval=2`
  # (drops every other frame in hardware) before the software encode, so x264enc
  # only has to chew ~30 fps. videorate on the NVMM path negotiates but produces a
  # stream rtspclientsink/mediamtx rejects on read (400 Bad Request) — verified
  # on-device 2026-06-16 — so the decoder drop is the right fps lever.
  cam_uq:
    source: publisher
    runOnDemand: >-
      gst-launch-1.0 -e
      rtspsrc location=rtsp://localhost:$RTSP_PORT/cam latency=0 protocols=tcp !
      rtph264depay !
      h264parse !
      nvv4l2decoder drop-frame-interval=2 !
      nvvidconv !
      'video/x-raw,width=640,height=360,format=I420' !
      x264enc tune=zerolatency bitrate=400 speed-preset=ultrafast key-int-max=30 !
      h264parse !
      rtspclientsink protocols=tcp location=rtsp://localhost:$RTSP_PORT/cam_uq
    runOnDemandRestart: yes
    runOnDemandCloseAfter: 10s
