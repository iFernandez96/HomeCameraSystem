# Run the FastAPI server in a container on the Jetson.
#
#   # On the Jetson, load the ARM64 image built by cross-deploy-server.sh,
#   # then recreate without building:
#   docker compose -f deploy/docker-compose.yml up -d --no-build server
#   docker compose -f deploy/docker-compose.yml logs -f
#   docker compose -f deploy/docker-compose.yml down
#
# MediaMTX is intentionally NOT in this compose file — it needs host access to
# /dev/video0 + libargus + the L4T-specific GStreamer plugins (nvarguscamerasrc,
# nvv4l2h264enc), which are simpler to wire up by running it natively. See
# deploy/systemd/mediamtx.service.

services:
  server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.server
    image: homecam-server:latest
    container_name: homecam-server
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    # Memory caps (iter-167). The Jetson Nano 2GB has ~2 GB total RAM, of
    # which `nvargus-daemon`, MediaMTX, the detection worker, and TensorRT
    # already eat ~1.4–1.7 GB in steady state. A leak in this container
    # (unbounded WebSocket subscribers, a runaway pywebpush retry loop,
    # etc.) used to compete unbounded with the worker, and the OOM killer
    # historically reached for `python3 detect.py` first — the worst piece
    # to lose. Capping at 512 MB gives the FastAPI app three orders of
    # magnitude more than its steady-state ~80 MB and forces a self-OOM
    # (then `restart: unless-stopped` recovers it) instead of a system-wide
    # OOM. `mem_reservation` is the soft floor the kernel honors under
    # global pressure — 256 MB ensures we don't get evicted before
    # genuine offenders.
    mem_limit: 512m
    mem_reservation: 256m
    ports:
      # PR-001 containment: FastAPI is reached remotely only through the
      # authenticated Tailscale Serve HTTPS proxy.  Keep the direct listener
      # on loopback so LAN and tailnet peers cannot bypass that boundary.
      - "127.0.0.1:8000:8000"
    volumes:
      - homecam-secrets:/app/secrets
      # PR-102 worker authentication. The host worker and container read the
      # same root-owned file; only the path is configuration, never the secret
      # bytes. Read-only + no implicit host-path creation keeps failures closed.
      - type: bind
        source: /etc/homecam/worker-auth.secret
        target: /run/secrets/homecam-worker-auth
        read_only: true
        bind:
          create_host_path: false
      # PR-202 encrypted backups. Only the X25519 recipient public key is
      # present on the Jetson; the recovery private key stays off-device.
      - type: bind
        source: /etc/homecam/backup-recipient.pem
        target: /run/secrets/homecam-backup-recipient.pem
        read_only: true
        bind:
          create_host_path: false
      # Bind-mount the snapshots dir so the host-side detection worker can
      # write thumbnails into the same location the server serves from.
      # (Docker named volumes can't be written from outside the container.)
      - type: bind
        source: /srv/homecam-media/snapshots
        target: /app/snapshots
        bind:
          create_host_path: false
      # iter-247 (Feature #1 slice 2b): same shape for clip recordings.
      # Worker (host-side) writes `<event_id>.mp4` via ffmpeg subprocess;
      # server (container) reads via FileResponse on
      # /api/events/{event_id}/clip. Default container path matches
      # the iter-201 `recordings_dir` setting.
      # MediaMTX also writes its bounded stream-copy archive below
      # `../recordings/continuous/`; the same mount lets the authenticated
      # timeline API index and serve those fMP4 segments without exposing
      # MediaMTX's unauthenticated playback port.
      - type: bind
        source: /srv/homecam-media/recordings
        target: /app/recordings
        bind:
          create_host_path: false
      # iter-263 (systems-engineering-auditor A1): same fix for
      # backups (iter-210) and timelapses (iter-213). Pre-iter-263
      # both defaulted to `./backups` and `./timelapses` inside the
      # container WORKDIR, so every `up -d --build` wiped operator
      # backups and timelapse outputs. Mirror of the iter-244e
      # users.db / jwt_secret / events.db relocation.
      - type: bind
        source: /srv/homecam-media/backups
        target: /app/backups
        bind:
          create_host_path: false
      - type: bind
        source: /srv/homecam-media/timelapses
        target: /app/timelapses
        bind:
          create_host_path: false
      # iter-351 (face-capture-for-retraining): host-side detection
      # worker writes face crops into ./face_captures via
      # detection/face_recog/capture.py; container server reads via
      # /api/face/captures (auth-gated, owner role). Mirror of the
      # iter-263 backups/timelapses bind-mount pattern. The
      # FACE_CAPTURES_DIR env var defaults to /app/face_captures so
      # this matches without any extra config.
      - type: bind
        source: /srv/homecam-media/face_captures
        target: /app/face_captures
        bind:
          create_host_path: false
      # iter-356.62 (tiered-capture slices 1+2+3): parallel root for
      # full-person crops the worker saves alongside each face crop.
      # Same bind-mount + 0o600 pattern as face_captures. NOT a subdir
      # of face_captures because the existing /face/captures listing
      # route walks face_captures/<name>/ and would treat a nested
      # _person subtree as a name bucket. Read by /api/training/export
      # (kind=person) and swept by face_capture_sweeper.
      - type: bind
        source: /srv/homecam-media/person_captures
        target: /app/person_captures
        bind:
          create_host_path: false
      # Generated timeline and incident exports are write-heavy media too.
      # Mount them below the secrets volume while keeping databases and keys
      # on the SD card. Refuse to create a fallback host path if USB is absent.
      - type: bind
        source: /srv/homecam-media/security-exports
        target: /app/secrets/security-exports
        bind:
          create_host_path: false
      # rw since OTA (harness #11, 2026-07-08): the owner-only update route
      # applies the client tier by atomic swap into this mount (checksummed
      # artifact, byte backups, rollback). Was :ro pre-OTA.
      - ../client/dist:/app/client_dist
    environment:
      # PR-104 canonical client-address boundary. Tailscale Serve connects on
      # the host, Docker forwards that loopback connection from the fixed
      # 172.30.0.1 gateway, and Uvicorn alone consumes X-Forwarded-For. Keep
      # this literal allowlist narrow; never use '*'. Direct container peers
      # and caller-supplied forwarding headers remain untrusted.
      - FORWARDED_ALLOW_IPS=127.0.0.1,::1,172.30.0.1
      # PR-001 temporary containment.  This literal value is intentionally
      # not operator-overridable: OTA stays fail-closed until its later
      # hardening work is completed and separately released.
      - HOMECAM_OTA_DISABLED=1
      - VAPID_SUBJECT=${VAPID_SUBJECT:-mailto:admin@example.com}
      # iter-256: 1-month clip retention. Sweep runs daily and
      # deletes recordings older than N days. Disk math at 720p30
      # H.264 ~50 KB/s (post-roll up to 180s = ~9 MB/clip): 30 d ×
      # 50 events/d × 9 MB ≈ 14 GB worst-case — fits the operator's
      # 64 GB SD with ~30 GB free as of iter-256. Bump only if the
      # event volume + clip-length math exceeds available disk.
      - RECORDINGS_RETENTION_DAYS=${RECORDINGS_RETENTION_DAYS:-30}
      # Short-retention MediaMTX stream-copy archive and the private
      # security-platform state/export workspace. Both roots already map to
      # the recordings bind mount / secrets named volume above.
      - CONTINUOUS_RECORDINGS_DIR=${CONTINUOUS_RECORDINGS_DIR:-/app/recordings/continuous}
      - SECURITY_STATE_PATH=${SECURITY_STATE_PATH:-/app/secrets/security-state.json}
      - SECURITY_EXPORTS_DIR=${SECURITY_EXPORTS_DIR:-/app/secrets/security-exports}
      - SECURITY_TIMELINE_MAX_RANGE_S=${SECURITY_TIMELINE_MAX_RANGE_S:-86400}
      - SECURITY_TIMELINE_EXPORT_MAX_RANGE_S=${SECURITY_TIMELINE_EXPORT_MAX_RANGE_S:-21600}
      - SECURITY_EXPORT_MAX_OUTSTANDING_JOBS=${SECURITY_EXPORT_MAX_OUTSTANDING_JOBS:-2}
      - SECURITY_EXPORT_MAX_TOTAL_BYTES=${SECURITY_EXPORT_MAX_TOTAL_BYTES:-5368709120}
      - SECURITY_EXPORT_MIN_FREE_BYTES=${SECURITY_EXPORT_MIN_FREE_BYTES:-4294967296}
      # Exact source addresses allowed to invoke MediaMTX's unauthenticated
      # auth callback. The dedicated network below pins the host gateway so a
      # Compose recreate cannot silently rotate this exact-address allowlist.
      # Adjacent containers such as 172.30.0.2 remain denied.
      - MEDIAMTX_AUTH_TRUSTED_CALLERS=${MEDIAMTX_AUTH_TRUSTED_CALLERS:-127.0.0.1,::1,172.30.0.1}
      - HOMECAM_WORKER_AUTH_FILE=/run/secrets/homecam-worker-auth
      - BACKUP_RECIPIENT_PUBLIC_KEY_PATH=/run/secrets/homecam-backup-recipient.pem
      - BACKUP_STATUS_PATH=/app/secrets/backup-status.json
      - BACKUP_RETENTION_COUNT=${BACKUP_RETENTION_COUNT:-14}
      - HOMECAM_WORKER_AUTH_TRUSTED_CALLERS=${HOMECAM_WORKER_AUTH_TRUSTED_CALLERS:-127.0.0.1,::1,172.30.0.1}
      - AUTOMATION_WEBHOOK_TIMEOUT_S=${AUTOMATION_WEBHOOK_TIMEOUT_S:-5}
      # Optional automation adapters. Empty values keep MQTT and physical
      # deterrence explicitly unavailable. A deterrence executable also needs
      # a deliberately configured read-only bind mount/device mapping.
      - HOMECAM_MQTT_HOST=${HOMECAM_MQTT_HOST:-}
      - HOMECAM_MQTT_PORT=${HOMECAM_MQTT_PORT:-1883}
      - HOMECAM_MQTT_USERNAME=${HOMECAM_MQTT_USERNAME:-}
      - HOMECAM_MQTT_PASSWORD=${HOMECAM_MQTT_PASSWORD:-}
      - HOMECAM_DETERRENCE_DRIVER=${HOMECAM_DETERRENCE_DRIVER:-}
      # iter-301 (user report "calendar number of detections look
      # super off"): server SQLite uses `date(ts, 'unixepoch',
      # 'localtime')` to bucket events by day for /api/events/
      # count_by_day. `localtime` resolves to the CONTAINER's TZ.
      # Without this env var the container runs UTC, but the
      # client (browser) computes day-bounds in the user's local
      # TZ — so a 23:30 PDT event lands under the next-day UTC
      # bucket on the heatmap, but the day-click sends the
      # ACTUAL May-1 PDT bounds and the server returns no rows
      # under those bounds. Off-by-one days at TZ boundaries.
      # Pin to America/Los_Angeles to match the operator's TZ.
      # Operator can override via environment if relocating.
      - TZ=${TZ:-America/Los_Angeles}
    # iter-195: hit /healthz, NOT /api/status. The iter-184 auth
    # gate covers /api/*, so a cookie-less curl probe would 401
    # forever and the container would report permanently unhealthy
    # after the auth-track deploy. /healthz is root-level + ungated
    # by design. PR-105 restricts /metrics separately to internal callers.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  homecam-secrets:

networks:
  default:
    name: homecam-net
    ipam:
      config:
        - subnet: 172.30.0.0/24
          gateway: 172.30.0.1
