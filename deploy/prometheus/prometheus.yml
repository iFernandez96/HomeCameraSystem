# Prometheus scrape config for the Home Camera System (iter-199).
#
# Mounted into the prometheus container by deploy/docker-compose.grafana.yml.
# Scrapes the homecam-server container's /metrics endpoint (iter-189) every
# 15 s — fast enough that the heartbeat-derived metrics (FPS, infer ms,
# thumb ms) reflect within a single scrape window of an actual change.
#
# The server's /metrics route is at root (NOT /api/*) and does not use browser
# cookies. PR-105 source-gates it to loopback plus the fixed 172.30.0.0/24
# HomeCam Compose network. Prometheus reaches the server internally as
# host=`server`, port=8000; remote Tailscale/LAN callers receive 404.

global:
  scrape_interval: 15s
  scrape_timeout: 5s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: homecam
    metrics_path: /metrics
    static_configs:
      - targets: ['server:8000']
        labels:
          deployment: jetson-nano-2gb
