groups:
  - name: homecam-health
    rules:
      - alert: HomecamDetectionWorkerDown
        expr: homecam_worker_alive == 0
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: Detection worker is offline
          description: No worker heartbeat has reached the server for at least two minutes.
      - alert: HomecamVideoStale
        expr: homecam_worker_seconds_since_last_frame > 30
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: Camera frames have stopped
          description: The worker is alive but has not captured a frame for over 30 seconds.
      - alert: HomecamCameraImageDegraded
        expr: homecam_camera_quality_status >= 2
        for: 1m
        labels: { severity: warning }
        annotations:
          summary: Camera image quality is degraded
          description: Low-cadence samples indicate sustained blur or repeated identical frames.
      - alert: HomecamJetsonHot
        expr: (homecam_cpu_temp_celsius > 80) or (homecam_gpu_temp_celsius > 80)
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: Jetson is running hot
          description: CPU or GPU temperature has remained above 80 C for five minutes.
      - alert: HomecamDiskLow
        expr: homecam_disk_free_gb < 5
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: Recording disk space is low
          description: Less than 5 GB remains on the server filesystem.
      - alert: HomecamRecordingCanaryFailed
        expr: homecam_recording_canary_ok == 0
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: Test recording is not playable
          description: The latest RTSP-to-MP4 check failed capture, full decode, storage, or cleanup validation.
      - alert: HomecamRecordingCanaryOverdue
        expr: homecam_recording_canary_checked_age_seconds > 2700 or absent(homecam_recording_canary_checked_age_seconds)
        for: 15m
        labels: { severity: warning }
        annotations:
          summary: Recording verification is overdue
          description: No fresh end-to-end recording proof arrived within the expected 45-minute window.
      - alert: HomecamRecordingStorageNotWritable
        expr: homecam_recording_storage_writable == 0
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: Capture storage is not writable
          description: The recording filesystem rejected or could not fsync the canary write probe.
      - alert: HomecamRecordingDriveSmartFailed
        expr: homecam_recording_drive_smart_healthy == 0
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: Capture drive reports SMART failure
          description: Preserve important clips and replace the capture drive.
      - alert: HomecamRecentEventClipUnplayable
        expr: homecam_recent_event_clip_playable == 0
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: A recent event video is not playable
          description: The recording exists, but a full decode of the sampled real event clip failed.
      - alert: HomecamRecordingJobStuck
        expr: homecam_recording_jobs_stuck > 0
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: Event video processing is stuck
          description: At least one event video has made no recording or finalization progress for over five minutes.
      - alert: HomecamRecordingUsbGuardianFailed
        expr: homecam_recording_usb_guardian_ok == 0
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: USB recording storage is not confirmed safe
          description: HomeCam could not confirm a writable ext4 block-device mount for recordings.
      - alert: HomecamCameraRecoveryLoop
        expr: increase(homecam_worker_mediamtx_restarts_total[15m]) > 2 or increase(homecam_worker_argus_restarts_total[15m]) > 0
        for: 1m
        labels: { severity: warning }
        annotations:
          summary: Camera pipeline is repeatedly recovering
          description: MediaMTX restarted repeatedly or the heavier Argus recovery was required.
