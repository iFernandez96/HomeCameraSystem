groups:
  - name: homecam-health
    rules:
      - alert: HomecamDetectionWorkerDown
        expr: homecam_worker_alive == 0
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: Detection worker is offline
          description: No worker heartbeat has reached the server for at least two minutes.
      - alert: HomecamVideoStale
        expr: homecam_worker_seconds_since_last_frame > 30
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: Camera frames have stopped
          description: The worker is alive but has not captured a frame for over 30 seconds.
      - alert: HomecamJetsonHot
        expr: (homecam_cpu_temp_celsius > 80) or (homecam_gpu_temp_celsius > 80)
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: Jetson is running hot
          description: CPU or GPU temperature has remained above 80 C for five minutes.
      - alert: HomecamDiskLow
        expr: homecam_disk_free_gb < 5
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: Recording disk space is low
          description: Less than 5 GB remains on the server filesystem.
      - alert: HomecamCameraRecoveryLoop
        expr: increase(homecam_worker_mediamtx_restarts_total[15m]) > 2 or increase(homecam_worker_argus_restarts_total[15m]) > 0
        for: 1m
        labels: { severity: warning }
        annotations:
          summary: Camera pipeline is repeatedly recovering
          description: MediaMTX restarted repeatedly or the heavier Argus recovery was required.
      - alert: HomecamWhepProbeFailed
        expr: homecam_whep_probe_consecutive_failures >= 3
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: Local live-view probe is failing
          description: The Jetson-local WHEP probe has failed repeatedly without receiving RTP.
      - alert: HomecamWhepExternalCellularOnlyFailure
        expr: homecam_whep_probe_success == 1 and homecam_whep_external_cellular_consecutive_failures >= 3
        for: 1m
        labels: { severity: warning }
        annotations:
          summary: Cellular live view is failing externally
          description: Cellular clients report repeated failure while the Jetson-local WHEP probe remains healthy; camera recovery is intentionally not triggered.
      - alert: HomecamBackupStatusMissing
        expr: homecam_backup_status_present == 0
        for: 30m
        labels: { severity: critical }
        annotations:
          summary: Encrypted backup status is missing
          description: No valid encrypted-backup status record is available after the startup grace period.
      - alert: HomecamBackupStale
        expr: time() - homecam_backup_last_success_timestamp_seconds > 129600
        for: 15m
        labels: { severity: critical }
        annotations:
          summary: Encrypted backup is stale
          description: The most recent successful encrypted backup is more than 36 hours old.
      - alert: HomecamBackupFailed
        expr: homecam_backup_last_attempt_success == 0
        for: 5m
        labels: { severity: critical }
        annotations:
          summary: Encrypted backup failed
          description: The latest encrypted-backup attempt failed; inspect the private backup ledger and service journal locally.
      - alert: HomecamRecordingStorageUnavailable
        expr: homecam_recording_storage_probe_success == 0
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: Recording storage is unavailable
          description: The server cannot inspect its configured recording storage; recording and retention may be unavailable.
      - alert: HomecamRootStorageProbeFailed
        expr: homecam_system_storage_probe_success == 0
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: Jetson root storage probe failed
          description: The server cannot inspect free space on the Jetson root filesystem.
      - alert: HomecamRootDiskLow
        expr: homecam_system_disk_free_gb < 2
        for: 10m
        labels: { severity: critical }
        annotations:
          summary: Jetson root disk space is critically low
          description: Less than 2 GB remains on the Jetson root filesystem.
      - alert: HomecamUpdateFailed
        expr: homecam_update_last_attempt_success == 0
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: HomeCam update did not apply
          description: The latest terminal update attempt was rejected or rolled back; inspect the private update ledger locally.
      - alert: HomecamRestoreFailed
        expr: homecam_restore_last_attempt_success == 0
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: HomeCam restore failed
          description: The latest restore attempt failed or was blocked; inspect the private recovery ledger locally.
      - alert: HomecamServerUnavailable
        expr: up{job="homecam"} == 0
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: HomeCam server is unavailable
          description: Prometheus cannot scrape the FastAPI server; the independent server supervisor owns bounded recovery.
      - alert: HomecamServerRecoveryLoop
        expr: homecam_server_supervisor_latched == 1
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: HomeCam server recovery stopped
          description: The host supervisor exhausted its bounded restart budget and latched to prevent a structural loop.
      - alert: HomecamServerSupervisorStateInvalid
        expr: homecam_server_supervisor_state_present == 1 and homecam_server_supervisor_state_valid == 0
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: Server supervisor state is invalid
          description: The persisted server-recovery state could not be validated; the supervisor fails closed in this condition.
      - alert: HomecamServerRestarted
        expr: homecam_server_supervisor_restarts_in_window > 0
        for: 1m
        labels: { severity: warning }
        annotations:
          summary: HomeCam server was restarted by supervision
          description: The server-only supervisor performed at least one bounded recovery action in its ten-minute window.
