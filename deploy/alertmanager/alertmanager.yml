global:
  resolve_timeout: 5m

route:
  receiver: homecam-web-push
  group_by: [alertname, drill]
  group_wait: 5s
  group_interval: 30s
  repeat_interval: 4h

receivers:
  - name: homecam-web-push
    webhook_configs:
      - url: http://alert-receiver:9095/alerts
        send_resolved: true
        max_alerts: 1
        timeout: 20s
