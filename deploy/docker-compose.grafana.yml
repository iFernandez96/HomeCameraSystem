# Opt-in observability stack (iter-199, Feature #11 slice 2).
#
# Stand alone OR layer on top of `docker-compose.yml`:
#
#   docker compose -f deploy/docker-compose.yml \
#                  -f deploy/docker-compose.grafana.yml up -d
#
# Adds Prometheus (scrapes the homecam-server's /metrics every 15 s)
# and Grafana (auto-loads two provisioned dashboards: Overview +
# Detection worker). PR-001 keeps Grafana on Jetson loopback and disables
# anonymous access. Operators must use an authenticated tunnel or a local SSH
# forward; no dashboard port is exposed directly to LAN or tailnet peers.
#
# RAM cost on the Nano 2GB: ~30 MB Prometheus + ~50 MB Grafana
# (roughly). The mediamtx + detection worker + server already eat
# 1.4-1.7 GB; the observability stack consumes maybe 4 % more. Run
# only if the operator wants the dashboards — there's no
# functional dependency from the rest of the stack on these two
# containers.
#
# Storage: Prometheus retains 14 days by default; on the Jetson
# eMMC that's a few hundred MB at our scrape rate.

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: homecam-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - homecam-prom-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=14d
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    # No public port — Grafana scrapes via the internal compose
    # network. Expose only if the operator runs an external
    # Prometheus federation setup.
    expose:
      - "9090"

  grafana:
    image: grafana/grafana:11.2.0
    container_name: homecam-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - homecam-grafana-data:/var/lib/grafana
    environment:
      # Grafana's own login remains mandatory even when an operator reaches it
      # through an authenticated tunnel. Credential lifecycle hardening is a
      # separate roadmap item; PR-001 only removes anonymous/direct access.
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  homecam-prom-data:
  homecam-grafana-data:
