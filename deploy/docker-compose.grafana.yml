# Opt-in observability stack (iter-199, Feature #11 slice 2).
#
# Stand alone OR layer on top of `docker-compose.yml`:
#
#   docker compose -f deploy/docker-compose.yml \
#                  -f deploy/docker-compose.grafana.yml up -d
#
# Adds Prometheus, Alertmanager, an independent Web Push alert receiver, and
# Grafana. Prometheus scrapes the homecam-server's internal-only /metrics every
# 15 s. PR-001 keeps Grafana and Alertmanager on Jetson loopback and disables
# anonymous access. Operators must use an authenticated tunnel or a local SSH
# forward; no dashboard port is exposed directly to LAN or tailnet peers.
#
# RAM cost on the Nano 2GB: ~30 MB Prometheus + ~50 MB Grafana
# (roughly). The mediamtx + detection worker + server already eat
# 1.4-1.7 GB; the observability stack consumes maybe 4 % more. Run
# only if the operator wants the dashboards — there's no
# functional dependency from the rest of the stack on these two
# containers.
#
# Storage: Prometheus retains 14 days by default; on the Jetson
# eMMC that's a few hundred MB at our scrape rate.

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: homecam-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - homecam-prom-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=14d
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    # No public port — Grafana reads Prometheus and Prometheus scrapes the
    # server over the internal homecam-net network. Do not publish this port;
    # PR-105's server boundary deliberately rejects remote metrics callers.
    expose:
      - "9090"

  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: homecam-alertmanager
    restart: unless-stopped
    depends_on:
      - alert-receiver
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - homecam-alertmanager-data:/alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
      - --web.external-url=http://127.0.0.1:9093
    # Loopback is for the bounded operator alert drill. Normal notification
    # traffic stays on the Compose network.
    ports:
      - "127.0.0.1:9093:9093"

  alert-receiver:
    image: homecam-server:latest
    container_name: homecam-alert-receiver
    restart: unless-stopped
    entrypoint:
      - uvicorn
      - app.alert_receiver:app
      - --host
      - 0.0.0.0
      - --port
      - "9095"
      - --no-access-log
    volumes:
      # Read-only by design: the FastAPI server remains the sole writer of
      # push subscriptions and VAPID material. The receiver reloads both on
      # every Alertmanager retry.
      - homecam-secrets:/app/secrets:ro
    environment:
      - VAPID_PRIVATE_KEY_PATH=/app/secrets/vapid_private.pem
      - VAPID_PUBLIC_KEY_PATH=/app/secrets/vapid_public.pem
      - PUSH_SUBS_PATH=/app/secrets/push_subs.json
      - VAPID_SUBJECT=${VAPID_SUBJECT:-mailto:admin@example.com}
    expose:
      - "9095"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9095/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  grafana:
    image: grafana/grafana:11.2.0
    container_name: homecam-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - homecam-grafana-data:/var/lib/grafana
    environment:
      # Grafana's own login remains mandatory even when an operator reaches it
      # through an authenticated tunnel. Credential lifecycle hardening is a
      # separate roadmap item; PR-001 only removes anonymous/direct access.
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  homecam-prom-data:
  homecam-grafana-data:
  homecam-alertmanager-data:
  # Same project-scoped volume declared by docker-compose.yml. Declaring it
  # here preserves the existing standalone observability-stack workflow.
  homecam-secrets:
