<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <!-- iter-262 (mobile-view-auditor A1): dropped `user-scalable=no` —
         WCAG 2.1 SC 1.4.4 (Resize Text) requires zoom. Inputs use 16 px
         font-size to suppress iOS auto-zoom-on-focus instead.
         iter-348 (mobile-view-auditor F1): interactive-widget=resizes-content
         tells the browser to SHRINK the layout viewport when the soft
         keyboard opens (Chrome 108+, iOS Safari 16+ standalone). Without
         it, <main>'s overflow-y-auto sees the full screen height even
         when the keyboard covers half of it — the iter-341 People search
         input could leave results hidden under the keyboard with no
         scroll path. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <!-- iter-356.35: status-bar / chrome theme matched to the cream
         light-theme bg + calico-orange accent. Pre-iter was #0a0a0a
         (legacy dark-theme leftover) which made iOS Safari and Android
         Chrome paint a near-black status bar on top of a cream app —
         visible "this is two apps stitched together" tell. -->
    <!-- iter-356.57 (radical redesign): theme-color shifted to the
         new "watchpost-at-dusk" parchment bg `#e8d4ac`. The old cream
         `#f4ead6` was so light it read "office software"; the new
         deeper toasted-wheat sets the warm-den identity from the
         very first paint — including the iOS standalone splash and
         Android Chrome status bar. -->
    <!-- iter-356.65 (Mira critic blocker #2): theme-color was set to
         the OLD cream `#e8d4ac` while the manifest + actual --color-bg
         are `#1e1710` (charred-oak dark). On iOS standalone the status
         bar painted cream above a dark app — visible "two apps stitched
         together" tell. Aligned all three to `#1e1710` and flipped
         apple-mobile-web-app-status-bar-style to black-translucent so
         the iOS standalone status bar overlays the dark surface
         seamlessly. -->
    <meta name="theme-color" content="#1e1710" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HomeCam" />
    <!-- iter-356.57 (radical redesign): typography shift. Inter
         stays as the body/UI face — readability is non-negotiable
         on a security-status surface. The shift is the addition of
         Fraunces as a DISPLAY serif for h1/h2 + brand wordmark.
         Fraunces is a variable font with optical sizing — at large
         sizes its terminals open up and it reads as something
         someone CHOSE rather than the Linear/Vercel/Stripe Inter
         default. Subset axes to wght 400-800 + opsz 9-72 so the
         payload stays under 80 KB. display=swap keeps first paint
         on the system fallback so no FOIT. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,800&display=swap"
    />
    <!-- iter-356.65 (mobile slice A) TODO: Vite emits hash-based
         per-route chunk filenames (e.g. `Live-DEADBEEF.js`), so
         a static `<link rel="modulepreload" href="/assets/Live-*.js">`
         can't be wired up without a build-time HTML transform. Punted
         to a follow-up: either (a) add a tiny rollup plugin that walks
         the manifest and emits the preload tag for the Live chunk, or
         (b) wait for vite-plugin-pwa / Vite to ship a first-class
         per-route-preload knob. Today the Live route is reached via
         `<Navigate to="/live">` from the auth gate, so the chunk is
         already requested as soon as the shell loads — preload would
         shave at most one round trip. -->
    <title>HomeCam</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
