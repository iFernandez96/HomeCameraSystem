<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Pre-paint theme resolver (dual-theme, 2026-07-02): resolves the
         stored preference ('system'|'light'|'dark') + prefers-color-scheme
         to a CONCRETE data-theme on <html> BEFORE any CSS paints, so a
         dark-pref user never sees a linen flash. Keep this logic exactly
         in sync with src/lib/theme.ts::resolveTheme, which owns it after
         boot (live OS-pref tracking, cross-tab sync, meta updates). -->
    <script>
      ;(function () {
        try {
          var p = localStorage.getItem('homecam:theme')
          var dark =
            p === 'dark' ||
            (p !== 'light' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.dataset.theme = dark ? 'dark' : 'light'
        } catch (e) {
          document.documentElement.dataset.theme = 'light'
        }
      })()
    </script>
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <!-- iter-356.66 (iOS edge-cases audit A1): apple-touch-icon. iOS
         IGNORES the Web Manifest `icons` array for the home-screen
         tile — without an apple-touch-icon link tag, install gets a
         generic letter glyph or a screenshot. Pointing at the
         existing icon-192.png (192x192) works; iOS scales to 180.
         An ideal 180×180 source would land at /apple-touch-icon.png
         later. -->
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />
    <!-- iter-262 (mobile-view-auditor A1): dropped `user-scalable=no` —
         WCAG 2.1 SC 1.4.4 (Resize Text) requires zoom. Inputs use 16 px
         font-size to suppress iOS auto-zoom-on-focus instead.
         iter-348 (mobile-view-auditor F1): interactive-widget=resizes-content
         tells the browser to SHRINK the layout viewport when the soft
         keyboard opens (Chrome 108+, iOS Safari 16+ standalone). Without
         it, <main>'s overflow-y-auto sees the full screen height even
         when the keyboard covers half of it — the iter-341 People search
         input could leave results hidden under the keyboard with no
         scroll path. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <!-- iter-356.35: status-bar / chrome theme matched to the cream
         light-theme bg + calico-orange accent. Pre-iter was #0a0a0a
         (legacy dark-theme leftover) which made iOS Safari and Android
         Chrome paint a near-black status bar on top of a cream app —
         visible "this is two apps stitched together" tell. -->
    <!-- iter-356.57 (radical redesign): theme-color shifted to the
         new "watchpost-at-dusk" parchment bg `#e8d4ac`. The old cream
         `#f4ead6` was so light it read "office software"; the new
         deeper toasted-wheat sets the warm-den identity from the
         very first paint — including the iOS standalone splash and
         Android Chrome status bar. -->
    <!-- Dual-theme chrome (2026-07-02): media-scoped pair covers the
         pre-JS window; lib/theme.ts rewrites BOTH contents to the
         resolved theme's --color-bg on apply (so a manual override
         beats the media attribute). Values MUST stay in lock-step
         with index.css --color-bg per theme and THEME_BG in
         lib/theme.ts — a mismatch is the "two apps stitched
         together" tell (see git history, Mira blocker #2). -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f3f1ea" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#232019" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="HomeCam" />
    <!-- Premium-launch slice (Mobile-perf F#1 + privacy): self-host
         Inter + Fraunces. Pre-fix the typography pipeline went
         through fonts.googleapis.com (~80 KB CSS over 2 RTTs of
         Tailscale) which (a) blocked first paint on cold cellular,
         (b) leaked the user's IP + UA to a third-party origin —
         both incompatible with this app's local-first / private-by-
         design contract. Now: variable woff2 files served from the
         app's own origin (~115 KB total), no third-party request,
         full offline support after first install. These two preload
         hints lift the woff2 fetches into the discovery phase so
         the network round-trip runs alongside the JS bundle. The
         @font-face declarations live in src/index.css (the previous
         /public/fonts.css workaround was lifted once the Node 18
         crypto.hash polyfill in vite.config.ts let CSS url() refs
         flow through Vite's normal asset pipeline). -->
    <link rel="preload" href="/fonts/inter-variable-latin.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
    <!-- UI/UX overhaul 2026-07-07 (perf F1): the Bricolage preload was
         dropped — it's a display face used only for headings, and
         preloading it competed with the JS bundle + Inter (the body
         face every visible glyph needs) for first-paint bandwidth on
         cold cellular. Bricolage still loads via its @font-face in
         src/index.css with font-display: swap, so headings render in
         the fallback face for a beat and then upgrade. -->

    <!-- iter-356.65 (mobile slice A) TODO: Vite emits hash-based
         per-route chunk filenames (e.g. `Live-DEADBEEF.js`), so
         a static `<link rel="modulepreload" href="/assets/Live-*.js">`
         can't be wired up without a build-time HTML transform. Punted
         to a follow-up: either (a) add a tiny rollup plugin that walks
         the manifest and emits the preload tag for the Live chunk, or
         (b) wait for vite-plugin-pwa / Vite to ship a first-class
         per-route-preload knob. Today the Live route is reached via
         `<Navigate to="/live">` from the auth gate, so the chunk is
         already requested as soon as the shell loads — preload would
         shave at most one round trip. -->
    <title>HomeCam</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
