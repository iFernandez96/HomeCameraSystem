<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <!-- iter-262 (mobile-view-auditor A1): dropped `user-scalable=no` —
         WCAG 2.1 SC 1.4.4 (Resize Text) requires zoom. Inputs use 16 px
         font-size to suppress iOS auto-zoom-on-focus instead.
         iter-348 (mobile-view-auditor F1): interactive-widget=resizes-content
         tells the browser to SHRINK the layout viewport when the soft
         keyboard opens (Chrome 108+, iOS Safari 16+ standalone). Without
         it, <main>'s overflow-y-auto sees the full screen height even
         when the keyboard covers half of it — the iter-341 People search
         input could leave results hidden under the keyboard with no
         scroll path. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <!-- iter-356.35: status-bar / chrome theme matched to the cream
         light-theme bg + calico-orange accent. Pre-iter was #0a0a0a
         (legacy dark-theme leftover) which made iOS Safari and Android
         Chrome paint a near-black status bar on top of a cream app —
         visible "this is two apps stitched together" tell. -->
    <!-- iter-356.55 (visual polish): theme-color follows the warm-
         hearth bg (#f4ead6) so iOS Safari + Android Chrome paint
         the status bar in the same surface tone as the page. -->
    <meta name="theme-color" content="#f4ead6" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#f4ead6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="HomeCam" />
    <!-- iter-356.55 (visual polish): Inter as the primary sans
         family. Premium-SaaS standard (Linear, Vercel, Stripe).
         `display=swap` so first paint uses the system fallback and
         then upgrades — no flash-of-invisible-text. Subset to the
         weights actually used (400/500/600/700) to keep the font
         payload under 50 KB on first load. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
    <title>HomeCam</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
