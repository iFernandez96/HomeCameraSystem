name: security

on:
  push:
  pull_request:
  schedule:
    - cron: "23 9 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, python, java-kotlin]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          queries: security-extended
      - uses: github/codeql-action/analyze@v4

  trivy:
    name: Dependencies and secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Run the recovered upstream image directly. Do not replace this with a
      # mutable trivy-action tag; that action suffered a tag compromise in 2026.
      - name: Scan tracked source
        run: |
          docker run --rm \
            -v "$PWD:/workspace:ro" \
            aquasec/trivy@sha256:be1190afcb28352bfddc4ddeb71470835d16462af68d310f9f4bca710961a41e \
            fs --scanners vuln,secret --severity HIGH,CRITICAL \
            --ignore-unfixed --exit-code 1 --skip-version-check /workspace
