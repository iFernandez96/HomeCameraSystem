name: security

on:
  push:
  pull_request:
  schedule:
    - cron: "23 9 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, python, java-kotlin]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: github/codeql-action/init@1ad29ea4a422cce9a242a9fae469541dcd08addc # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          queries: security-extended
      - uses: github/codeql-action/analyze@1ad29ea4a422cce9a242a9fae469541dcd08addc # v4

  trivy:
    name: Reproducible image, SBOM, dependencies, and secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
        with:
          platforms: arm64
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      # Run the recovered upstream image directly. Do not replace this with a
      # mutable trivy-action tag; that action suffered a tag compromise in 2026.
      - name: Build ARM64 artifact and generate security evidence
        run: ./scripts/generate-security-artifacts.sh
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: security-evidence-${{ github.sha }}
          path: security-artifacts/
          if-no-files-found: error
          retention-days: 30
