name: performance

on:
  push:
    paths: ["client/**", ".github/workflows/performance.yml"]
  pull_request:
    paths: ["client/**", ".github/workflows/performance.yml"]

permissions:
  contents: read

jobs:
  mobile-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/requirements-dev.txt
      - run: npm ci
        working-directory: client
      - run: python -m venv /tmp/homecam-venv && /tmp/homecam-venv/bin/pip install --require-hashes -r server/requirements-dev.txt
      - run: npx playwright install --with-deps chromium
        working-directory: client
      - run: npm run test:e2e:mobile
        working-directory: client
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: failure()
        with:
          name: mobile-playwright-evidence
          path: |
            client/playwright-report/
            client/test-results/

  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci && npm run build
        working-directory: client
      - name: Enforce performance budgets
        run: npx --yes @lhci/cli@0.15.1 autorun --config=lighthouserc.cjs
        working-directory: client
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: lighthouse-reports
          path: client/.lighthouseci/reports/
