name: performance

on:
  push:
    paths: ["client/**", ".github/workflows/performance.yml"]
  pull_request:
    paths: ["client/**", ".github/workflows/performance.yml"]

permissions:
  contents: read

jobs:
  mobile-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/requirements-dev.txt
      - run: npm ci
        working-directory: client
      - run: python -m venv /tmp/homecam-venv && /tmp/homecam-venv/bin/pip install -r server/requirements-dev.txt
      - run: npx playwright install --with-deps chromium
        working-directory: client
      - run: npm run test:e2e:mobile
        working-directory: client
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: mobile-playwright-evidence
          path: |
            client/playwright-report/
            client/test-results/

  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci && npm run build
        working-directory: client
      - name: Enforce performance budgets
        run: npx --yes @lhci/cli@0.15.1 autorun --config=lighthouserc.cjs
        working-directory: client
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-reports
          path: client/.lighthouseci/reports/
