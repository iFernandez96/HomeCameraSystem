version: 2
updates:
  - package-ecosystem: npm
    directory: /client
    schedule: { interval: weekly }
    groups:
      client-runtime: { dependency-type: production }
      client-tooling: { dependency-type: development }
  - package-ecosystem: pip
    directory: /server
    schedule: { interval: weekly }
  - package-ecosystem: gradle
    directory: /
    schedule: { interval: weekly }
  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: weekly }
